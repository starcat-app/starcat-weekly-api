# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

# ===========================================
# 触发条件: 仅 tag 推送触发部署
# ===========================================
# 改用 tag 触发的理由:
# - 避免普通 main push 误触发部署
# - 让 deploy.sh (scripts/deploy.sh) 成为唯一受控的发布入口
# - 与 starcat-sharing-api / starcat-trending-api 保持一致的 tag-based 部署
#
# 配合 scripts/deploy.sh 使用:
#   1. dev 分支上开发完成, 推 origin
#   2. 跑 scripts/deploy.sh v1.1.0
#   3. 脚本自动: PR dev→main → merge → 打 tag → 推 tag → 触发本 workflow
# ===========================================
name: Fly Deploy
on:
  push:
    tags:
      - 'v*'
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
