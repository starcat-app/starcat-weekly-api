name: Go

# ===========================================
# 触发条件
# ===========================================
on:
  # push 到 main / master 分支时触发 (PR merge 后验证)
  push:
    branches: [main, master]
    # tag 推送时也触发 (发版后再次验证 release 包能编译)
    # 配合 scripts/deploy.sh: tag 推送后自动跑一次 CI
    tags: ['v*']
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  # 收到指向 main / master 的 PR 时触发
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  # 支持手动触发 (Actions 页面)
  workflow_dispatch:

# ===========================================
# 任务定义
# ===========================================
jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    # Go 版本矩阵
    # 注意: 项目 go.mod 要求 go >= 1.25.0, 矩阵不能放低于 1.25 的版本, 否则
    # GOTOOLCHAIN=local 会拒绝构建
    strategy:
      matrix:
        go-version: [1.25]
      # 任意一个版本失败则整体失败
      fail-fast: false

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Go
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      # 3. 验证依赖完整性
      - name: Verify dependencies
        run: go mod verify

      # 4. 格式化检查 (gofmt)
      - name: Check gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "gofmt found issues:"
            gofmt -s -d .
            exit 1
          fi

      # 5. 静态分析 (go vet)
      - name: Run go vet
        run: go vet ./...

      # 6. 编译检查
      - name: Build
        run: go build -v -o starcat-weekly-api ./cmd/server/

      # 7. 单元测试
      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...
