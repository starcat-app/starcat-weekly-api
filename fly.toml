# fly.toml — starcat-weekly-api
# 与 starcat-sharing-api / starcat-trending-api 保持一致的 Fly.io 部署配置
# (端口、env、health check 等参照其他两个项目对齐)

app = 'starcat-weekly-api'
primary_region = 'nrt'

[build]

[env]
  GOGC = '100'
  GOMAXPROCS = '1'
  PORT = '5003'
  # 以下变量建议通过 fly secrets set 配置以保持各项目一致性:
  # API_KEYS="sk-starcat-..."
  # ADMIN_API_KEYS="sk-starcat-admin-..."
  # GITHUB_TOKENS="ghp_...,ghp_..."
  # STORE_FILE="/data/weekly.db"
  # REPO_DIR="/data/weekly-repo"
  # HELLOGITHUB_CRON="31 6 * * *"
  # HELLOGITHUB_RECONCILE_CRON="29 7 29 * *"

[processes]
  app = './server'

[[mounts]]
  source = 'starcat_weekly_data'
  destination = '/data'

[http_service]
  internal_port = 5003
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
